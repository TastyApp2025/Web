<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#fffbf6" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="Independent South African food reviews from a professional chef. Real experiences. Self-funded meals. No sponsorships." />
    <meta property="og:title" content="ForYourInfluence - Real Food, No Hype" />
    <meta property="og:description" content="Chef-led restaurant and takeaway reviews. Independent. Honest. Unsponsored." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ForYourInfluence - Chef-Led SA Food Reviews" />
    <meta name="twitter:description" content="Real food experiences from a professional chef." />

    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <title>ForYourInfluence | Real Food, No Hype</title>

    <!-- Canonical URL -->
    <link rel="canonical" href="https://foryourinfluence.com/" />

    <!-- JSON-LD Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ForYourInfluence",
      "url": "https://foryourinfluence.com",
      "logo": "https://foryourinfluence.com/favicon.png",
      "description": "Independent South African food reviews. Chef-led. Self-funded. No sponsored content.",
      "sameAs": [
        "https://www.youtube.com/@ForYourInfluence",
        "https://www.instagram.com/4yourinfluence",
        "https://www.tiktok.com/@foryourinfluence"
      ],
      "founder": {
        "@type": "Person",
        "name": "Wesley",
        "url": "https://foryourinfluence.com/about"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Media Inquiries",
        "email": "chef@foryourinfluence.com"
      }
    }
    </script>

    <!-- JSON-LD Structured Data - Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Wesley",
      "url": "https://foryourinfluence.com/about",
      "image": "https://foryourinfluence.com/favicon.png",
      "jobTitle": "Professional Chef",
      "worksFor": {
        "@type": "Organization",
        "name": "ForYourInfluence",
        "url": "https://foryourinfluence.com"
      },
      "sameAs": [
        "https://www.youtube.com/@ForYourInfluence",
        "https://www.instagram.com/4yourinfluence",
        "https://www.tiktok.com/@foryourinfluence"
      ]
    }
    </script>

    <!-- JSON-LD Structured Data - LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "ForYourInfluence - Food Reviews",
      "description": "Independent restaurant and takeaway reviews from a professional chef in South Africa",
      "url": "https://foryourinfluence.com",
      "serviceArea": {
        "@type": "Place",
        "name": "South Africa"
      },
      "priceRange": "Varies"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Service Worker registered');
            })
            .catch(err => {
              console.log('Service Worker registration failed');
            });
        });
      }
    </script>
  </body>
</html>
