<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="ForYourInfluence: Honest South African food experiences. Professional chef-led reviews, independent, unsponsored, and useful." />
    <meta property="og:title" content="ForYourInfluence | Chef Led South African Food Experiences" />
    <meta property="og:description" content="No ratings. No free meals. Real food experiences from a professional chef." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" /> <!-- Placeholder -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ForYourInfluence" />
    <meta name="twitter:description" content="Honest South African Food Experiences." />

    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <title>ForYourInfluence | Honest SA Food</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
